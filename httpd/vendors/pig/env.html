<!DOCTYPE html>
<html lang="zh">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>变量管理</title>
	<link rel="stylesheet" href="style.css">
</head>
<body class="iframe-content">
	<div class="card">
		<h2>变量管理</h2>
		<p>此页面可以管理设备的<strong>环境变量</strong>。可以<strong>查询、修改、删除</strong>或<strong>重置</strong>所有变量。<br>请输入<strong>变量名</strong>和<strong>变量值</strong>,然后点击相应的按钮执行。点击<strong>重启设备</strong>按钮设备立即重启。
		</p>
		<div class="env-input-group">
			<div><label for="env-name"><strong>变量名：</strong></label><input type="text" id="env-name"
					placeholder="请输入变量名:例如bootcmd,若留空查全部。"></div>
			<div><label for="env-value"><strong>变量值：</strong></label><input type="text" id="env-value"
					placeholder="请输入变量值,留空仅查及删,结果自动填充。"></div>
		</div>
		<div class="button-container"><button id="query-env">查询变量</button><button
				id="update-env">修改变量</button><button id="delete-env">删除变量</button><button id="reset-all">重置所有</button><button id="reboot-device">重启设备</button></div>
		<div class="tips" id="tips"><strong>提示：</strong>
			<ul>
				<li>此页面仅供<b>高级用户</b>使用,普通用户不建议直接操作！错误的值可能导致启动失败或设备损坏。</li>
				<li>推荐查询全部变量,避免因名称错误导致查不到。重置所有即调取当前U-BOOT内置作为默认。</li>
				<li>一般推荐修改bootcmd/bootargs/mtdparts,修改其它变量<b>需谨慎操作</b>!修改完成后立即生效。</li>
			</ul>
		</div>
	</div>
	<script src="env.js"></script>
</body>
</html>
