<!DOCTYPE html>
<html lang="zh">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>更新CDT</title>
	<link rel="stylesheet" href="style.css">
</head>
<body class="iframe-content">
	<div class="card">
		<h2>更新CDT</h2>
		<p>即将更新设备的<b> CDT</b>(Configuration Data Table, 配置数据表)。<br>请选择要更新的<b>CDT文件</b>，然后点击<b>确认更新</b>按钮。</p>
		<form enctype="multipart/form-data" name="cdt">
			<div class="form-group">
				<label for="cdt-file">请选择<b> CDT文件</b></label>
				<input type="file" name="cdt" id="cdt-file" accept=".cdt,.CDT,.bin,.BIN,.img,.IMG,cdt.*,CDT.*" required>
			</div>
			<div class="button-container"><button type="submit">确认更新</button></div>
		</form>
		<p id="sha256-display"></p>
		<div class="tips"><b>提示：</b>
			<ul>
				<li>请确认所选的CDT文件是正确的;</li>
				<li>更新CDT是非常危险的操作，可能会损坏您的设备;</li>
				<li>请勿在更新过程中断开路由器电源，如果更新成功，设备将自动重启。</li>
			</ul>
		</div>
	</div>
	<script src="submit.js"></script>
</body>
</html>
