<!DOCTYPE html>
<html lang="zh">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Web终端</title>
	<link rel="stylesheet" href="style.css">
</head>
<body class="iframe-content">
	<div class="card">
		<h2>Web终端</h2>
		<div class="terminal-container">
			<a href="term.html" target="_blank" class="terminal-expand" id="expandBtn" title="独立窗口打开">⧉</a>
			<div class="terminal-output-wrapper">
				<div class="terminal-output" id="terminalOutput"></div>
				<span class="terminal-status-bottom" id="connectionStatus">✗</span>
			</div>
			<div class="terminal-input-line">
				<span class="terminal-prompt">></span>
				<input type="text" class="terminal-input" id="terminalInput" placeholder="输入命令并按回车执行" autofocus>
				<button class="terminal-btn" id="sendBtn">发送</button>
				<button class="terminal-btn terminal-clear" id="clearBtn">清屏</button>
			</div>
		</div>
	</div>
	<script src="term.js"></script>
</body>
</html>
