<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Web终端</title>
	<link rel="stylesheet" href="style.css">
	<style>
		/* 终端页面独立样式 - 不影响 style.css */
		.terminal-container {
			background: #0c0c0c;
			border-radius: 8px;
			overflow: hidden;
			display: flex;
			flex-direction: column;
		}

		.terminal-output {
			background: #300a24;
			padding: 15px;
			max-width: 910px;
			width: 100%;
			overflow-y: auto;
			white-space: pre-wrap;
			word-wrap: break-word;
			line-height: 1.2;
			min-height: 475px;
			max-height: 475px;
		}

		.terminal-output::-webkit-scrollbar {
			width: 8px;
		}

		.terminal-output::-webkit-scrollbar-track {
			background: #1e1e1e;
		}

		.terminal-output::-webkit-scrollbar-thumb {
			background: #4ecb71;
			border-radius: 4px;
		}

		.terminal-input-line {
			background: #3a142e;
			border-top: 1px solid #3a142e;
			padding: 5px;
			display: flex;
			align-items: center;
			gap: 5px;
		}

		/* 合并公共文字样式 */
		.terminal-prompt,
		.terminal-input,
		.terminal-output {
			color: #ffffff;
			font-family: monospace;
			font-size: 13px;
		}

		.terminal-prompt {
			font-weight: bold;
		}

		.terminal-input {
			flex: 1;
			background: rgba(48, 10, 36, 0);
			border: none;
			outline: none;
		}

		.terminal-input::placeholder {
			color: #5a5a5a;
		}

		/* 合并按钮公共样式 */
		.terminal-btn,
		.terminal-clear {
			border: none;
			font-family: monospace;
			font-size: 12px;
			font-weight: bold;
			padding: 5px 15px;
			border-radius: 4px;
			cursor: pointer;
			transition: background-color 0.3s;
			background: #5a5a5a;
			color: #ffffff;
		}

		/* 按钮激活状态 */
		.terminal-btn.active,
		.terminal-clear.active {
			background: #3498db;
			color: #ffffff;
		}

		/* 激活按钮悬停 */
		.terminal-btn.active:hover,
		.terminal-clear.active:hover {
			background: #2980b9;
		}

		/* 激活按钮按下 */
		.terminal-btn.active:active,
		.terminal-clear.active:active {
			background: #2573a7;
		}

		/* 非激活按钮悬停 */
		.terminal-btn:hover:not(.active),
		.terminal-clear:hover:not(.active) {
			background: #6a6a6a;
		}

		.terminal-output-wrapper {
			position: relative;
			flex: 1;
		}

		.terminal-status-bottom {
			position: absolute;
			bottom: 0px;
			right: 15px;
			color: #cccccc;
			font-size: .75rem;
			z-index: 10;
		}

		h3 {
			color: #2980b9;
			font-size: 2.5rem;
			margin: 0 auto 1rem;
			white-space: nowrap;
			text-align: center;
		}

		h3::after {
			content: "";
			display: block;
			width: 100%;
			height: .2px;
			background: #e2e2e2;
			margin: .5rem auto 0;
		}
	</style>
</head>

<body>
	<div class="main-container">
		<div class="sidebar">
			<ul class="sidebar-nav">
				<li class="sidebar-nav-item"><a href="index.html">固件更新</a></li>
				<li class="sidebar-nav-item"><a href="uboot.html">U-BOOT更新</a></li>
				<li class="sidebar-nav-item"><a href="art.html">ART更新</a></li>
				<li class="sidebar-nav-item"><a href="cdt.html">CDT更新</a></li>
				<li class="sidebar-nav-item"><a href="ptable.html">PTABLE更新</a></li>
				<li class="sidebar-nav-item"><a href="initramfs.html">INITRAMFS启动</a></li>
				<li class="sidebar-nav-item"><a href="env.html">变量管理</a></li>
				<li class="sidebar-nav-item active"><a>Web终端</a></li>
			</ul>
		</div>
		<div class="main-content">
			<div class="card">
				<h3>Web终端</h3>
				<div class="terminal-container">
					<div class="terminal-output-wrapper">
						<div class="terminal-output" id="terminalOutput"></div>
						<span class="terminal-status-bottom" id="connectionStatus">● 已连接</span>
					</div>
					<div class="terminal-input-line">
						<span class="terminal-prompt">#</span>
						<input type="text" class="terminal-input" id="terminalInput" placeholder="输入命令并按回车执行" autofocus>
						<button class="terminal-btn" id="sendBtn">发送</button>
						<button class="terminal-btn terminal-clear" id="clearBtn">清屏</button>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script>
		const POLL_INTERVAL = 500;
		const FETCH_OPTS = { cache: 'no-cache', headers: { 'Cache-Control': 'no-cache' } };
		let pollTimer = null;
		let lastSeq = -1;

		const terminalOutput = document.getElementById('terminalOutput');
		const terminalInput = document.getElementById('terminalInput');
		const sendBtn = document.getElementById('sendBtn');
		const clearBtn = document.getElementById('clearBtn');
		const connectionStatus = document.getElementById('connectionStatus');

		function showWelcome() {
			terminalOutput.textContent = '终端已就绪。输入命令并按回车键或点击发送按钮执行。\n\n';
		}

		async function fetchStatus() {
			try {
				const response = await fetch('/webterm/status', FETCH_OPTS);
				if (response.ok) {
					const seq = parseInt(await response.text(), 10);
					if (seq !== lastSeq) {
						lastSeq = seq;
						await fetchOutput();
					}
				}
				connectionStatus.textContent = response.ok ? '● 已连接' : '● 已断开';
				connectionStatus.style.color = response.ok ? '#4ecb71' : '#e74c3c';
			} catch (error) { }
			if (pollTimer) clearTimeout(pollTimer);
			pollTimer = setTimeout(fetchStatus, POLL_INTERVAL);
		}

		async function fetchOutput() {
			try {
				const response = await fetch('/webterm/data', FETCH_OPTS);
				const text = await response.text();
				if (text) {
					terminalOutput.textContent += text;
					terminalOutput.scrollTop = terminalOutput.scrollHeight;
					updateButtonStyles();
				}
			} catch (error) { }
		}

		async function sendCommand() {
			const command = terminalInput.value.trim();
			if (!command) return;

			[terminalInput, sendBtn].forEach(el => el.disabled = true);

			try {
				const response = await fetch('/webterm/cmd', {
					method: 'POST',
					headers: { 'Content-Type': 'text/plain' },
					body: command
				});

				response.ok ? (terminalInput.value = '',
					clearTimeout(pollTimer),
					pollTimer = setTimeout(fetchStatus, 100))
				: (terminalOutput.textContent += `\n[错误] 发送失败: HTTP ${response.status}\n`,
					terminalOutput.scrollTop = terminalOutput.scrollHeight);
			} catch (error) {
				if (error.name !== 'TypeError') {
					terminalOutput.textContent += `\n[错误] ${error.message}\n`;
					terminalOutput.scrollTop = terminalOutput.scrollHeight;
				}
			} finally {
				[terminalInput, sendBtn].forEach(el => el.disabled = false);
				terminalInput.focus();
				updateButtonStyles();
			}
		}

		function clearTerminal() {
			terminalOutput.textContent = '';
			updateButtonStyles();
		}

		function startPolling() {
			stopPolling();
			pollTimer = setTimeout(fetchStatus, POLL_INTERVAL);
		}

		function stopPolling() {
			if (pollTimer) clearTimeout(pollTimer);
			pollTimer = null;
		}

		function updateButtonStyles() {
			sendBtn.classList.toggle('active', terminalInput.value.trim().length > 0);
			clearBtn.classList.toggle('active', terminalOutput.textContent.trim().length > 0);
		}

		Object.entries({
			input: updateButtonStyles,
			keypress: (e) => e.key === 'Enter' && sendCommand()
		}).forEach(([event, handler]) => terminalInput.addEventListener(event, handler));

		[sendBtn, clearBtn].forEach((btn, i) => btn.addEventListener('click', [sendCommand, clearTerminal][i]));

		showWelcome();
		updateButtonStyles();
		startPolling();

		window.addEventListener('beforeunload', stopPolling);
	</script>
	<div class="additional-links">
		<p class="link-tip">您可以在右方链接中了解本项目的更多信息:<a href="https://github.com/1980490718/u-boot-2016" target="_blank">GitHub</a> | Version:</p>
	</div>
</body>
</html>
