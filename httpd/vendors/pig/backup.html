<!DOCTYPE html>
<html lang="zh">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>备份分区</title>
	<script>var t=localStorage.getItem('theme')||'';if(t)document.documentElement.setAttribute('data-theme',t)</script>
	<link rel="stylesheet" href="style.css">
</head>
<body class="iframe-content">
	<div class="card">
		<h2>备份分区</h2>
		<p>选择要备份的<b>分区名称</b>，点击<b>确认备份</b>按钮将分区数据保存到本地。</p>
		<div class="backup-row">
			<div class="backup-col">
				<label for="part-select">分区名称</label>
				<select id="part-select" ></select>
			</div>
			<div class="backup-col">
				<label>分区信息</label>
				<div id="size-display" class="size-display"></div>
			</div>
		</div>
		<div class="button-container"><button id="backup-btn" disabled>确认备份</button></div>
		<div class="tips">
			<ul>
				<li>rootfs分区可能读取及下载时间较长，请耐心等待；</li>
				<li>因内存大小限制，选择的rootfs分区可能无法完成备份；</li>
				<li>备份过程中不能操作其他内容以及刷新页面或拔掉网线。</li>
			</ul>
		</div>
	</div>
	<script>
var sel=document.getElementById('part-select');
var sizeEl=document.getElementById('size-display');
var dlBtn=document.getElementById('backup-btn');
var partsData=[];

function formatSize(v){
	if(v<1024)return v+' B';
	if(v<1048576)return(v/1024).toFixed(1)+' KiB';
	if(v<1073741824)return(v/1048576).toFixed(1)+' MiB';
	return(v/1073741824).toFixed(1)+' GiB';
}

function updateSize(){
	var idx=sel.selectedIndex;
	var p=(idx>=0&&idx<partsData.length)?partsData[idx]:null;
	if(!p){sizeEl.textContent='';return;}
	var emmc=p.flash==='emmc';
	var end=emmc?p.start+p.size-1:p.start+p.size;
	var sz=emmc?p.size*512:p.size;
	sizeEl.textContent='0x'+p.start.toString(16).toUpperCase()+'-0x'+end.toString(16).toUpperCase()+' ('+formatSize(sz)+')';
}

sel.onchange=updateSize;

function loadPartitions(){
	sel.disabled=true;
	dlBtn.disabled=true;
	sel.innerHTML='';
	sizeEl.textContent='';
	var xhr=new XMLHttpRequest();
	xhr.open('GET','/partitions',true);
	xhr.timeout=10000;
	xhr.onload=function(){
		if(xhr.status!==200)return;
		var data;
		try{data=JSON.parse(xhr.responseText);}catch(e){return;}
		if(!data.parts||!data.parts.length)return;
		partsData=data.parts;
		sel.innerHTML='';
		for(var i=0;i<partsData.length;i++){
			var opt=document.createElement('option');
			opt.value=i;
			opt.textContent=partsData[i].name;
			sel.appendChild(opt);
		}
		sel.disabled=false;
		dlBtn.disabled=false;
		updateSize();
	};
	xhr.send();
}

sel.onchange=updateSize;

dlBtn.onclick=function(){
	var idx=sel.selectedIndex;
	if(idx<0||idx>=partsData.length)return;
	var name=partsData[idx].name;
	dlBtn.disabled=true;
	var xhr=new XMLHttpRequest();
	xhr.open('GET','/backup?part='+encodeURIComponent(name),true);
	xhr.responseType='blob';
	xhr.onprogress=function(e){
	};
	xhr.onload=function(){
		dlBtn.disabled=false;
		if(xhr.status===200){
			var blob=new Blob([xhr.response]);
			var url=URL.createObjectURL(blob);
			var a=document.createElement('a');
			a.href=url;
			a.download=name+'.bin';
			document.body.appendChild(a);
			a.click();
			document.body.removeChild(a);
			URL.revokeObjectURL(url);
		}else{
		}
	};
	xhr.onerror=function(){
		dlBtn.disabled=false;
	};
	xhr.send();
};

loadPartitions();

(function(){
	function apply(v){v?document.documentElement.setAttribute('data-theme',v):document.documentElement.removeAttribute('data-theme');}
	window.addEventListener('storage',function(e){if(e.key==='theme')apply(e.newValue||'');});
	window.addEventListener('message',function(e){if(e.data&&e.data.type==='theme')apply(e.data.theme||'');});
})();
	</script>
</body>
</html>
