<!DOCTYPE html>
<html lang="zh">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>固件更新</title>
	<script>var t=localStorage.getItem('theme')||'';if(t)document.documentElement.setAttribute('data-theme',t)</script>
	<link rel="stylesheet" href="style.css">
</head>
<body class="iframe-content">
	<div class="card">
		<h2><svg class="icon" viewBox="0 0 24 24"><use href="icons.svg#icon-upload"/></svg>更新固件</h2>
		<p>即将更新此设备的<b>固件</b>。<br>请选择要更新的<b>固件文件</b>并点击<b>确认更新</b>按钮。</p>
		<form enctype="multipart/form-data" name="firmware">
			<div class="form-group">
				<label for="fw-file">请选择<b>固件文件</b></label>
				<input type="file" name="firmware" id="fw-file" accept=".ubi,.UBI,.bin,.BIN,.trx,.TRX,.img,.IMG" required>
			</div>
			<div class="button-container"><button type="submit">确认更新</button></div>
		</form>
		<p id="sha256-display"></p>
		<div class="tips">
			<ul>
				<li>请确认所选的固件文件是正确的；</li>
				<li>更新过程中不能断开设备的电源；</li>
				<li>更新完成后将自动重启。</li>
			</ul>
		</div>
	</div>
	<script src="submit.js"></script>
</body>
</html>
