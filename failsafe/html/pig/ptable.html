<!DOCTYPE html>
<html lang="zh">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>更新GPT/MIBIB</title>
	<script>var t=localStorage.getItem('theme')||'';if(t)document.documentElement.setAttribute('data-theme',t)</script>
	<link rel="stylesheet" href="style.css">
</head>
<body class="iframe-content">
	<div class="card">
		<h2><svg class="icon" viewBox="0 0 24 24"><use href="icons.svg#icon-table"/></svg>更新GPT/MIBIB</h2>
		<p>即将更新此设备的<b>PARTITION TABLE</b>(GPT/MIBIB)，EMMC闪存选<b>GPT</b>文件。<br>NOR/NAND闪存选<b>MIBIB</b>文件，选择适合此设备的<b>分区表文件</b>后点击<b>确认更新</b>按钮。</p>
		<form enctype="multipart/form-data" name="ptable">
			<div class="form-group">
				<label for="ptable-file">请选择<b>GPT/MIBIB文件</b></label>
				<input type="file" name="ptable" id="ptable-file" accept=".gpt,.GPT,.mibib,.MIBIB,.bin,.BIN,.img,.IMG" required>
			</div>
			<div class="button-container"><button type="submit">确认更新</button></div>
		</form>
		<p id="sha256-display"></p>
		<div class="tips">
			<ul>
				<li>请确认所选的分区表文件是正确的，跨平台/型号/版本的表文件不一定通用；</li>
				<li>NOR/NAND闪存选择MIBIB表文件，EMMC闪存选择GPT表文件；</li>
				<li>更新分区表非常危险，可能会损坏设备；更新完成后将自动重启。</li>
			</ul>
		</div>
	</div>
	<script src="submit.js"></script>
</body>
</html>
